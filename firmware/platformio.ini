; Firefly Blue Ghost IMU — carrier firmware
; Adafruit nRF52 core (NOT mbed) — avoids the GCC 7.2 / arm64 failure from the brief (§11).
; Canonical build: GitHub Actions (x86_64). Flash/test: desktop x86_64.

[platformio]
default_envs = xiao_nrf52840_sense
src_dir = src

[env:xiao_nrf52840_sense]
; The OFFICIAL platformio/nordicnrf52 platform does NOT ship the XIAO nRF52840 boards.
; The maxgerhardt fork adds xiaoble_adafruit / xiaoblesense_adafruit with the
; Adafruit nRF52 core (Bluefruit) — it's the standard path for the XIAO Sense.
platform  = https://github.com/maxgerhardt/platform-nordicnrf52.git
; Adafruit-core board for the XIAO nRF52840 Sense (works for the Sense Plus too:
; same nRF52840 + onboard LSM6DS3TR-C, the Plus only exposes more GPIO/BAT).
board     = xiaoblesense_adafruit
framework = arduino

monitor_speed = 115200

; Bluefruit BLE is included in the Adafruit nRF52 core (not a lib_dep).
lib_deps =
    adafruit/Adafruit LIS3MDL
    adafruit/Adafruit LSM6DS
    adafruit/Adafruit Unified Sensor

build_flags =
    -DCFG_DEBUG=0
