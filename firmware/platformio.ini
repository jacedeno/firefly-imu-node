; Firefly Blue Ghost IMU — carrier firmware
; Core Adafruit nRF52 (NO mbed) — evita el fallo GCC 7.2 / arm64 del brief (§11).
; Build canónico: GitHub Actions (x86_64). Flasheo/prueba: desktop x86_64.

[platformio]
default_envs = xiao_nrf52840_sense
src_dir = src

[env:xiao_nrf52840_sense]
; El platform OFICIAL platformio/nordicnrf52 NO trae los boards XIAO nRF52840.
; El fork de maxgerhardt añade xiaoble_adafruit / xiaoblesense_adafruit con el
; core Adafruit nRF52 (Bluefruit) — es el camino estándar para el XIAO Sense.
platform  = https://github.com/maxgerhardt/platform-nordicnrf52.git
; board Adafruit-core para el XIAO nRF52840 Sense (sirve para el Sense Plus:
; mismo nRF52840 + LSM6DS3TR-C onboard, el Plus solo expone más GPIO/BAT).
board     = xiaoblesense_adafruit
framework = arduino

monitor_speed = 115200

; Bluefruit BLE viene incluido en el core Adafruit nRF52 (no es lib_dep).
lib_deps =
    adafruit/Adafruit LIS3MDL
    adafruit/Adafruit LSM6DS
    adafruit/Adafruit Unified Sensor

build_flags =
    -DCFG_DEBUG=0
